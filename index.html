<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint OS v28.0 - Recovery Edition</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #1a1c22 url('https://unsplash.com') center/cover no-repeat fixed; 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; 
        }
        /* BOOT SEQUENCE STYLES */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #4af626; font-family: 'Consolas', monospace;
            padding: 20px; z-index: 20000; display: flex; flex-direction: column;
        }
        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; display: none; }
        #panel { position: fixed; bottom: 0; width: 100%; height: 45px; background: #23272e; display: none; align-items: center; padding: 0 10px; border-top: 1px solid #444; z-index: 10000; }
        .p-btn { background: #4ea84e; color: white; border: none; padding: 6px 12px; cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; }
        #clock { margin-left: auto; font-family: monospace; color: #aaa; }
        .win { position: absolute; width: 750px; height: 500px; background: #383c4a; display: none; flex-direction: column; border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #555; overflow: hidden; z-index: 100; }
        .hdr { background: #23272e; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: grab; user-select: none; }
        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 8px; }
        #term-box { background: #000; color: #4af626; height: 100%; display: flex; flex-direction: column; padding: 12px; font-family: 'Consolas', monospace; }
        #term-hist { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; margin-bottom: 5px; }
        #term-in { background: transparent; color: #fff; border: none; outline: none; flex-grow: 1; font-family: inherit; font-size: 14px; }
        .icon { position: absolute; width: 90px; text-align: center; cursor: pointer; padding: 10px; color: white; text-shadow: 1px 1px 4px black; }
        .icon span { font-size: 32px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="boot-screen"></div>

<div id="desktop">
    <div class="icon" style="top: 20px; left: 20px;" onclick="openWin('t-win')"><span>🖥️</span>Terminal</div>
    <div class="icon" style="top: 130px; left: 20px;" onclick="openWin('e-win')"><span>📁</span>Files</div>
    <div class="icon" style="top: 240px; left: 20px;" onclick="openWin('b-win')"><span>🌐</span>Browser</div>
    <div class="icon" style="top: 350px; left: 20px;" onclick="openWin('a-win')"><span>🛍️</span>Store</div>

    <div id="t-win" class="win" style="top: 50px; left: 150px; width: 600px; height: 400px;">
        <div class="hdr"><span>🖥️ Terminal</span><button class="close-btn" onclick="closeWin('t-win')">X</button></div>
        <div class="content" style="background:#000;">
            <div id="term-box" onclick="document.getElementById('term-in').focus()">
                <div id="term-hist">Web-Mint v28.0 | Type 'help'</div>
                <div style="display:flex"><span style="color:#4af626">mint@web:~$ &nbsp;</span><input type="text" id="term-in" autocomplete="off" spellcheck="false"></div>
            </div>
        </div>
    </div>

    <div id="b-win" class="win" style="top: 80px; left: 280px; width: 600px; height: 320px;">
        <div class="hdr"><span>🌐 Browser</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content" style="padding: 20px; text-align: center;">
            <input type="text" id="url-bar" value="google.com" style="width:70%; padding:8px;">
            <button onclick="launchCloaked()" style="padding:8px 15px;">Launch</button>
        </div>
    </div>

    <div id="e-win" class="win" style="top: 150px; left: 100px; width: 450px;">
        <div class="hdr"><span>📁 Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content">
            <div id="explorer-view" style="overflow-y:auto; height:100%;"></div>
        </div>
    </div>
    
    <div id="a-win" class="win" style="top: 120px; left: 400px; width: 500px; height: 450px;">
        <div class="hdr"><span>🛍️ Store</span><button class="close-btn" onclick="closeWin('a-win')">X</button></div>
        <div class="content">App Store Content Here</div>
    </div>
</div>

<div id="panel">
    <button class="p-btn">Start</button>
    <div id="clock">00:00:00</div>
</div>

<script>
    let highestZ = 1000;
    // PREMADE .OS FILES
    let virtualFS = { 
        "Cinnamon.os": "SEC_LEVEL_MAX: Encryption active. Security protocols enabled.",
        "Icey.os": "PERF_MODE: UI animations disabled. CPU priority set to High.",
        "Creamy.os": "STORAGE_V2: Block allocation expanded. Compression active.",
        "welcome.txt": "Welcome to Web-Mint Recovery Edition."
    };

    // BOOT SEQUENCE LOGIC
    const bootLogs = [
        "[  OK  ] Started Kernel Management.",
        "[  OK  ] Loading VirtualFS Drivers...",
        "[  OK  ] Initializing Cinnamon Security...",
        "[  OK  ] Checking Speed (Icey) Modules...",
        "[  OK  ] Mounting Creamy Storage...",
        "[  OK  ] Network Interface UP.",
        "Welcome to Web Mint OS v28.0 (Recovery Edition)"
    ];

    function startBoot() {
        const boot = document.getElementById('boot-screen');
        let i = 0;
        const interval = setInterval(() => {
            if (i < bootLogs.length) {
                boot.innerHTML += `<div>${bootLogs[i]}</div>`;
                i++;
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    boot.style.display = 'none';
                    document.getElementById('desktop').style.display = 'block';
                    document.getElementById('panel').style.display = 'flex';
                }, 1000);
            }
        }, 400);
    }

    function openWin(id) {
        const w = document.getElementById(id);
        w.style.display = 'flex';
        w.style.zIndex = ++highestZ;
    }

    function closeWin(id) {
        document.getElementById(id).style.display = 'none';
    }

    function runFile(name) {
        const content = virtualFS[name];
        if (name === "Cinnamon.os") {
            alert("🔐 SECURITY BOOT: System is now hardened.");
            document.body.style.border = "4px solid #4ea84e";
        } else if (name === "Icey.os") {
            alert("⚡ SPEED BOOT: Background processes terminated.");
            document.body.style.filter = "contrast(1.2)";
        } else if (name === "Creamy.os") {
            alert("💾 STORAGE BOOT: Cache cleared. 50GB virtual space mapped.");
        } else {
            alert("Reading: " + content);
        }
    }

    function loadExplorer() {
        const view = document.getElementById('explorer-view');
        view.innerHTML = "";
        Object.keys(virtualFS).forEach(f => {
            const item = document.createElement('div');
            item.style = "padding:10px; cursor:pointer; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; color:black;";
            item.innerHTML = `<span>📄 ${f}</span> <button onclick="runFile('${f}')">EXECUTE</button>`;
            view.appendChild(item);
        });
    }

    // Drag Logic
    document.querySelectorAll('.win').forEach(win => {
        const h = win.querySelector('.hdr');
        h.onmousedown = (e) => {
            win.style.zIndex = ++highestZ;
            let sx = e.clientX - win.offsetLeft, sy = e.clientY - win.offsetTop;
            document.onmousemove = (ev) => {
                win.style.left = ev.clientX-sx+'px'; win.style.top = ev.clientY-sy+'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = () => { startBoot(); loadExplorer(); };
</script>
</body>
</html>
