<!DOCTYPE html>
<html>
<head>
    <title>Web Mint - Cinnamon</title>
    <style>
        body { background: #2f343f; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        #panel { position: fixed; bottom: 0; width: 100%; height: 45px; background: #23272e; display: flex; align-items: center; padding: 0 15px; border-top: 1px solid #444; }
        .p-btn { background: #4ea84e; color: white; border: none; padding: 8px 15px; cursor: pointer; margin-right: 10px; border-radius: 4px; font-weight: bold; }
        
        /* The Windows */
        .win { position: absolute; top: 10%; left: 10%; width: 450px; height: 300px; background: #383c4a; border: 1px solid #555; display: none; flex-direction: column; border-radius: 8px; box-shadow: 0 10px 30px black; }
        .hdr { background: #23272e; padding: 10px; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; }
        .content { padding: 20px; flex-grow: 1; }
        
        /* Desktop text */
        #msg { padding: 50px; text-align: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="msg">
        <h1>Linux Mint Web OS</h1>
        <p>If you see the buttons at the bottom, click them!</p>
    </div>

    <!-- Taskbar -->
    <div id="panel">
        <button class="p-btn" onclick="document.getElementById('t-win').style.display='flex'">🖥️ Terminal</button>
        <button class="p-btn" onclick="document.getElementById('e-win').style.display='flex'">📁 Explorer</button>
    </div>

    <!-- Terminal -->
    <div id="t-win" class="win">
        <div class="hdr"><span>Terminal</span><button onclick="this.parentElement.parentElement.style.display='none'">X</button></div>
        <div class="content" style="background:black; color:lime; font-family:monospace;">
            Welcome. Terminal is running!<br><br>
            mint@web:~$ _
        </div>
    </div>

    <!-- Explorer -->
    <div id="e-win" class="win">
        <div class="hdr"><span>File Explorer</span><button onclick="this.parentElement.parentElement.style.display='none'">X</button></div>
        <div class="content" style="background:white; color:black;">
            <b>Home Folder</b><br><hr>
            📁 Documents<br>
            📁 Downloads<br>
            📄 readme.txt
        </div>
    </div>

</body>
</html>
