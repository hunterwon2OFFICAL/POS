<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint OS v28.0 - Scramjet Edition</title>
    <style>
        /* [Keeping your original styles + minor additions for apps] */
        * { box-sizing: border-box; }
        body { background: #1a1c22 url('https://unsplash.com') center/cover no-repeat fixed; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #4af626; font-family: 'Consolas', monospace; padding: 20px; z-index: 20000; display: flex; flex-direction: column; }
        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; display: none; }
        #panel { position: fixed; bottom: 0; width: 100%; height: 45px; background: #23272e; display: none; align-items: center; padding: 0 10px; border-top: 1px solid #444; z-index: 10000; }
        .p-btn { background: #4ea84e; color: white; border: none; padding: 6px 12px; cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; }
        #clock { margin-left: auto; font-family: monospace; color: #aaa; }
        .win { position: absolute; width: 750px; height: 500px; background: #383c4a; display: none; flex-direction: column; border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #555; overflow: hidden; z-index: 100; }
        .hdr { background: #23272e; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: grab; user-select: none; }
        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 8px; }
        #term-box { background: #000; color: #4af626; height: 100%; display: flex; flex-direction: column; padding: 12px; font-family: 'Consolas', monospace; }
        #term-hist { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; margin-bottom: 5px; }
        #term-in { background: transparent; color: #fff; border: none; outline: none; flex-grow: 1; font-family: inherit; font-size: 14px; }
        .icon { position: absolute; width: 90px; text-align: center; cursor: pointer; padding: 10px; color: white; text-shadow: 1px 1px 4px black; }
        .icon span { font-size: 32px; display: block; margin-bottom: 5px; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

<div id="boot-screen"></div>

<div id="desktop">
    <!-- Desktop Icons -->
    <div class="icon" style="top: 20px; left: 20px;" onclick="openWin('t-win')"><span>🖥️</span>Terminal</div>
    <div class="icon" style="top: 130px; left: 20px;" onclick="openWin('e-win')"><span>📁</span>Files</div>
    <div class="icon" style="top: 240px; left: 20px;" onclick="openWin('b-win')"><span>🌐</span>Browser</div>
    <div class="icon" style="top: 350px; left: 20px;" onclick="openWin('gn-win')"><span>🧮</span>GN Math</div>

    <!-- Terminal Window -->
    <div id="t-win" class="win" style="top: 50px; left: 150px; width: 600px; height: 400px;">
        <div class="hdr"><span>🖥️ Terminal</span><button class="close-btn" onclick="closeWin('t-win')">X</button></div>
        <div class="content" style="background:#000;">
            <div id="term-box" onclick="document.getElementById('term-in').focus()">
                <div id="term-hist">Web-Mint v28.0 | Type 'help' or 'touch filename.txt'</div>
                <div style="display:flex"><span style="color:#4af626">mint@web:~$ &nbsp;</span><input type="text" id="term-in" autocomplete="off" spellcheck="false"></div>
            </div>
        </div>
    </div>

    <!-- Scramjet Browser Window -->
    <div id="b-win" class="win" style="top: 80px; left: 280px; width: 800px; height: 500px;">
        <div class="hdr"><span>🌐 Scramjet Proxy Browser</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div style="background: #eee; padding: 5px; display: flex; gap: 5px;">
            <input type="text" id="url-bar" placeholder="Enter URL or search..." style="flex-grow:1; padding:5px;">
            <button onclick="launchProxy()">Go</button>
        </div>
        <div class="content">
            <iframe id="browser-view"></iframe>
        </div>
    </div>

    <!-- GN Math Window -->
    <div id="gn-win" class="win" style="top: 100px; left: 350px; width: 700px; height: 450px;">
        <div class="hdr"><span>🧮 GN Math</span><button class="close-btn" onclick="closeWin('gn-win')">X</button></div>
        <div class="content">
            <iframe src="https://geogebra.org"></iframe>
        </div>
    </div>

    <!-- Explorer Window -->
    <div id="e-win" class="win" style="top: 150px; left: 100px; width: 450px; height: 400px;">
        <div class="hdr"><span>📁 Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content">
            <div id="explorer-view" style="overflow-y:auto; height:100%;"></div>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" onclick="alert('Menu coming soon!')">Start</button>
    <div id="clock">00:00:00</div>
</div>

<script>
    let highestZ = 1000;
    
    // Virtual File System (Now dynamic)
    let virtualFS = JSON.parse(localStorage.getItem('mint_fs')) || {
        "Cinnamon.os": "SEC_LEVEL_MAX",
        "Icey.os": "PERF_MODE",
        "welcome.txt": "Welcome to Web-Mint Scramjet Edition."
    };

    function saveFS() {
        localStorage.setItem('mint_fs', JSON.stringify(virtualFS));
        loadExplorer();
    }

    // SCRAMJET PROXY LOGIC
    function launchProxy() {
        const url = document.getElementById('url-bar').value;
        const frame = document.getElementById('browser-view');
        
        // This is a typical Scramjet/Ultraviolet construction
        // It encodes the URL and passes it through the service worker prefix
        if (url) {
            const prefix = '/service/'; // Default Scramjet prefix
            frame.src = prefix + btoa(url).replace(/\//g, '_').replace(/\+/g, '-');
        }
    }

    // TERMINAL LOGIC
    const termIn = document.getElementById('term-in');
    const termHist = document.getElementById('term-hist');

    termIn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = termIn.value.trim();
            const args = cmd.split(' ');
            termHist.innerHTML += `\n<span style="color:#4af626">mint@web:~$</span> ${cmd}`;
            
            if (args[0] === 'touch') {
                virtualFS[args[1]] = "New file created.";
                saveFS();
                termHist.innerHTML += `\nCreated file: ${args[1]}`;
            } else if (cmd === 'help') {
                termHist.innerHTML += `\nAvailable: touch [name], help, clear, ls`;
            } else if (cmd === 'ls') {
                termHist.innerHTML += `\n${Object.keys(virtualFS).join('  ')}`;
            } else if (cmd === 'clear') {
                termHist.innerHTML = "Web-Mint v28.0 | Type 'help'";
            }
            
            termIn.value = "";
            termHist.scrollTop = termHist.scrollHeight;
        }
    });

    // BOOT SEQUENCE
    function startBoot() {
        const boot = document.getElementById('boot-screen');
        const logs = ["[ OK ] Kernel Initialized.", "[ OK ] Scramjet Proxy Active.", "[ OK ] Mounting localFS...", "[ OK ] Ready."];
        let i = 0;
        const interval = setInterval(() => {
            if (i < logs.length) { boot.innerHTML += `<div>${logs[i]}</div>`; i++; }
            else { 
                clearInterval(interval);
                boot.style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                document.getElementById('panel').style.display = 'flex';
            }
        }, 300);
    }

    function openWin(id) {
        const w = document.getElementById(id);
        w.style.display = 'flex';
        w.style.zIndex = ++highestZ;
    }

    function closeWin(id) {
        document.getElementById(id).style.display = 'none';
    }

    function loadExplorer() {
        const view = document.getElementById('explorer-view');
        view.innerHTML = "";
        Object.keys(virtualFS).forEach(f => {
            const item = document.createElement('div');
            item.style = "padding:10px; cursor:pointer; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; color:black;";
            item.innerHTML = `<span>📄 ${f}</span> <button onclick="alert('Content: ${virtualFS[f]}')">VIEW</button>`;
            view.appendChild(item);
        });
    }

    // Draggable Logic
    document.querySelectorAll('.win').forEach(win => {
        const h = win.querySelector('.hdr');
        h.onmousedown = (e) => {
            win.style.zIndex = ++highestZ;
            let sx = e.clientX - win.offsetLeft, sy = e.clientY - win.offsetTop;
            document.onmousemove = (ev) => {
                win.style.left = ev.clientX-sx+'px';
                win.style.top = ev.clientY-sy+'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = () => { startBoot(); loadExplorer(); };
</script>
</body>
</html>
