<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint OS v6.0</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            /* I put your exact file path here. If it doesn't show, you may need to host it or use a web link */
            background: #2f343f url('file:///home/chronos/u-9d5c7590003e20250841f4563cdf3e21441a4aa8/MyFiles/Downloads/Screenshot%202026-04-28%2011.01.03%20PM.png') center/cover no-repeat fixed; 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }

        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; }

        /* Taskbar */
        #panel { 
            position: fixed; bottom: 0; width: 100%; height: 45px; 
            background: rgba(30, 30, 30, 0.95); display: flex; align-items: center; 
            padding: 0 10px; border-top: 1px solid #444; z-index: 9999;
        }

        .p-btn { background: #4ea84e; color: white; border: none; padding: 6px 15px; cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; }
        .p-btn:hover { background: #5cb85c; }

        /* Windows */
        .win { position: absolute; width: 650px; height: 450px; background: #383c4a; display: none; flex-direction: column; border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #555; }
        .hdr { background: #23272e; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px 6px 0 0; cursor: grab; user-select: none; }
        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 10px; }

        /* Browser Fix */
        .browser-bar { background: #eee; padding: 8px; display: flex; gap: 5px; border-bottom: 1px solid #ccc; }
        .browser-bar input { flex-grow: 1; border: 1px solid #bbb; padding: 5px; border-radius: 4px; }
        iframe { width: 100%; flex-grow: 1; border: none; background: white; }

        /* File Explorer */
        .toolbar { background: #f0f0f0; padding: 8px; border-bottom: 1px solid #ccc; display: flex; gap: 10px; }
        .file-item { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .file-item:hover { background: #e8f5e9; }
        #editor-area { width: 100%; height: 100%; padding: 15px; border: none; resize: none; font-size: 16px; outline: none; }
    </style>
</head>
<body>

<div id="desktop">
    <!-- Browser -->
    <div id="b-win" class="win" style="top: 50px; left: 300px; width: 850px; height: 550px;">
        <div class="hdr"><span>🌐 Web Browser</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content">
            <div class="browser-bar">
                <input type="text" id="url-bar" placeholder="Search or enter URL (e.g. duckduckgo.com)">
                <button onclick="goUrl()">Search/Go</button>
            </div>
            <!-- Using a search engine that often allows iframes -->
            <iframe id="browser-frame" src="https://duckduckgo.com"></iframe>
        </div>
    </div>

    <!-- Explorer -->
    <div id="e-win" class="win" style="top: 150px; left: 80px;">
        <div class="hdr"><span>📁 Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content">
            <div class="toolbar">
                <button onclick="createNewFile()">➕ New File</button>
            </div>
            <div id="explorer-view" style="overflow-y:auto;"></div>
        </div>
    </div>

    <!-- Notepad -->
    <div id="n-win" class="win" style="top: 100px; left: 450px; width: 500px; height: 400px;">
        <div class="hdr"><span id="note-title">📄 Notepad</span><button class="close-btn" onclick="closeWin('n-win')">X</button></div>
        <div class="content">
            <textarea id="editor-area"></textarea>
            <div style="background:#ddd; padding:5px; text-align:right;"><button onclick="saveFile()">💾 Save</button></div>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" style="background:#2ecc71" onclick="openWin('e-win')">LM</button>
    <button class="p-btn" onclick="openWin('e-win')">Files</button>
    <button class="p-btn" onclick="openWin('b-win')">Browser</button>
</div>

<script>
    let highestZ = 100;
    let currentFile = "";
    let virtualFS = { "readme.txt": "Welcome to Version 6.0!" };

    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWin(win);
    }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }
    function focusWin(win) { win.style.zIndex = ++highestZ; }

    // FILE SYSTEM
    function loadExplorer() {
        const view = document.getElementById('explorer-view');
        view.innerHTML = "";
        for (let file in virtualFS) {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `📄 ${file}`;
            item.onclick = () => openFile(file);
            view.appendChild(item);
        }
    }

    function createNewFile() {
        const name = prompt("Enter file name (e.g. text.txt):");
        if(name) {
            virtualFS[name] = "";
            loadExplorer();
        }
    }

    function openFile(name) {
        currentFile = name;
        document.getElementById('note-title').innerText = name;
        document.getElementById('editor-area').value = virtualFS[name];
        openWin('n-win');
    }

    function saveFile() {
        if(currentFile) {
            virtualFS[currentFile] = document.getElementById('editor-area').value;
            alert("Saved!");
        }
    }

    // BROWSER
    function goUrl() {
        let val = document.getElementById('url-bar').value;
        let target = document.getElementById('browser-frame');
        
        if(!val.includes('.')) {
            // If it's not a URL, search for it
            target.src = "https://duckduckgo.com" + encodeURIComponent(val);
        } else {
            if(!val.startsWith('http')) val = 'https://' + val;
            target.src = val;
        }
    }

    // DRAG
    document.querySelectorAll('.win').forEach(win => {
        const header = win.querySelector('.hdr');
        header.onmousedown = function(e) {
            focusWin(win);
            let sx = e.clientX - win.offsetLeft;
            let sy = e.clientY - win.offsetTop;
            document.onmousemove = (e) => {
                win.style.left = (e.clientX - sx) + 'px';
                win.style.top = (e.clientY - sy) + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    loadExplorer();
</script>

</body>
</html>
