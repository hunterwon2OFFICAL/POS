<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint OS - v3.0</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #1a1c22; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            background: url('https://unsplash.com') center/cover;
        }

        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; }

        /* Taskbar */
        #panel { 
            position: fixed; bottom: 0; width: 100%; height: 45px; 
            background: rgba(30, 30, 30, 0.9); display: flex; align-items: center; 
            padding: 0 10px; border-top: 1px solid #444; z-index: 9999;
        }

        .p-btn { 
            background: #4ea84e; color: white; border: none; padding: 6px 15px; 
            cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; 
        }

        /* Generic Window Style */
        .win { 
            position: absolute; width: 600px; height: 400px; 
            background: #383c4a; display: none; flex-direction: column; 
            border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #555; 
        }

        .hdr { 
            background: #23272e; padding: 10px; display: flex; 
            justify-content: space-between; align-items: center;
            border-radius: 6px 6px 0 0; cursor: grab;
        }

        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000; }
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 8px; }

        /* Terminal Style */
        #term-box { background: #000; color: #4af626; height: 100%; display: flex; flex-direction: column; padding: 10px; font-family: monospace; }
        #term-hist { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; }
        #term-in { background: transparent; color: #4af626; border: none; outline: none; width: 100%; font-family: inherit; }

        /* Explorer & Notepad */
        .file-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .file-item:hover { background: #e8f5e9; }
        #notepad-text { width: 100%; height: 100%; padding: 15px; border: none; outline: none; font-size: 16px; resize: none; }

        /* Browser Header */
        .browser-bar { background: #ddd; padding: 5px; display: flex; gap: 5px; }
        .browser-bar input { flex-grow: 1; padding: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div id="desktop">
    <!-- Terminal -->
    <div id="t-win" class="win" style="top:20px; left:20px;">
        <div class="hdr"><span>🖥️ Terminal</span><button class="close-btn" onclick="closeWin('t-win')">X</button></div>
        <div class="content"><div id="term-box" onclick="document.getElementById('term-in').focus()"><div id="term-hist">Web-Mint Terminal&#10;Type 'help' for commands.</div><div style="display:flex"><span>mint@web:~$</span><input id="term-in" type="text" autocomplete="off" spellcheck="false"></div></div></div>
    </div>

    <!-- Explorer -->
    <div id="e-win" class="win" style="top:100px; left:100px;">
        <div class="hdr"><span>📁 Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content" id="file-list"></div>
    </div>

    <!-- Notepad (File Opener) -->
    <div id="n-win" class="win" style="top:50px; left:400px; width:500px; height:400px;">
        <div class="hdr"><span>📄 Text Editor</span><button class="close-btn" onclick="closeWin('n-win')">X</button></div>
        <div class="content"><textarea id="notepad-text"></textarea></div>
    </div>

    <!-- Browser -->
    <div id="b-win" class="win" style="top:30px; left:300px; width:800px; height:500px;">
        <div class="hdr"><span>🌐 MintBrowser</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content">
            <div class="browser-bar"><input type="text" id="url-in" value="https://duckduckgo.com"><button onclick="loadUrl()">Go</button></div>
            <iframe id="web-frame" src="https://duckduckgo.com" style="width:100%; flex-grow:1; border:none;"></iframe>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" style="background:#2ecc71">LM</button>
    <button class="p-btn" onclick="openWin('t-win')">Terminal</button>
    <button class="p-btn" onclick="openWin('e-win')">Files</button>
    <button class="p-btn" onclick="openWin('b-win')">Browser</button>
</div>

<script>
    let highestZ = 100;
    const fileSystem = {
        "readme.txt": "Welcome to Mint Web OS! \n\nThis is a simulation of Linux built with HTML, CSS, and JS. \nEnjoy!",
        "system_specs.txt": "OS: Web-Mint v3.0\nMemory: 16GB Virtual RAM\nKernel: JavaScript-Core",
        "passwords.txt": "admin: 123456\nroot: password123"
    };

    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWin(win);
    }

    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    function focusWin(win) { win.style.zIndex = ++highestZ; }

    // Explorer Logic
    function renderExplorer() {
        const list = document.getElementById('file-list');
        list.innerHTML = "";
        for (let fileName in fileSystem) {
            let div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `📄 ${fileName}`;
            div.onclick = () => openFile(fileName);
            list.appendChild(div);
        }
    }

    function openFile(name) {
        document.getElementById('notepad-text').value = fileSystem[name];
        openWin('n-win');
    }

    // Terminal Logic
    document.getElementById('term-in').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const hist = document.getElementById('term-hist');
            const val = this.value.toLowerCase().trim();
            hist.innerHTML += `\nmint@web:~$ ${this.value}`;
            
            if (val === 'ls') hist.innerHTML += `\n${Object.keys(fileSystem).join('  ')}`;
            else if (val === 'clear') hist.innerHTML = "Terminal Cleared.";
            else if (val === 'neofetch') hist.innerHTML += "\n<b>Mint Web OS</b>\nKernel: HTML5/JS\nUptime: 10 minutes";
            else if (val.startsWith('cat ')) {
                let file = val.split(' ')[1];
                hist.innerHTML += `\n${fileSystem[file] || "File not found."}`;
            }
            else hist.innerHTML += `\nCommand '${val}' not found.`;
            
            this.value = "";
            document.getElementById('term-box').scrollTop = 9999;
        }
    });

    function loadUrl() {
        let url = document.getElementById('url-in').value;
        if(!url.includes('://')) url = 'https://' + url;
        document.getElementById('web-frame').src = url;
    }

    // Dragging logic
    document.querySelectorAll('.win').forEach(win => {
        const hdr = win.querySelector('.hdr');
        hdr.onmousedown = function(e) {
            focusWin(win);
            let shiftX = e.clientX - win.offsetLeft;
            let shiftY = e.clientY - win.offsetTop;
            document.onmousemove = (e) => {
                win.style.left = e.clientX - shiftX + 'px';
                win.style.top = e.clientY - shiftY + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
        win.onmousedown = () => focusWin(win);
    });

    renderExplorer();
</script>

</body>
</html>
