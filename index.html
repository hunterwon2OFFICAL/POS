<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint OS v24.0 - Emergency Recovery</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #1a1c22 url('file:///home/chronos/u-9d5c7590003e20250841f4563cdf3e21441a4aa8/MyFiles/Downloads/Screenshot%202026-04-28%2011.01.03%20PM.png') center/cover no-repeat fixed; 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }

        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; }

        /* Panel */
        #panel { position: fixed; bottom: 0; width: 100%; height: 45px; background: #23272e; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid #444; z-index: 10000; }
        .p-btn { background: #4ea84e; color: white; border: none; padding: 6px 12px; cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; }
        #clock { margin-left: auto; font-family: monospace; color: #aaa; }

        /* Windows */
        .win { position: absolute; width: 700px; height: 450px; background: #383c4a; display: none; flex-direction: column; border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #555; overflow: hidden; }
        .hdr { background: #23272e; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: grab; user-select: none; }
        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 8px; }

        /* Terminal */
        #term-box { background: #000; color: #4af626; height: 100%; display: flex; flex-direction: column; padding: 10px; font-family: monospace; }
        #term-hist { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }
        #term-in { background: transparent; color: #fff; border: none; outline: none; flex-grow: 1; font-family: inherit; font-size: 14px; }

        /* Icons */
        .icon { position: absolute; width: 90px; text-align: center; cursor: pointer; padding: 10px; color: white; text-shadow: 1px 1px 4px black; }
        .icon span { font-size: 32px; display: block; margin-bottom: 5px; }
        
        /* Explorer & Notepad */
        .file-item { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .file-item:hover { background: #e8f5e9; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" style="top: 20px; left: 20px;" onclick="openWin('t-win')"><span>🖥️</span>Terminal</div>
    <div class="icon" style="top: 130px; left: 20px;" onclick="openWin('e-win')"><span>📁</span>Files</div>
    <div class="icon" style="top: 240px; left: 20px;" onclick="openWin('b-win')"><span>🌐</span>Browser</div>
    <div class="icon" style="top: 350px; left: 20px;" onclick="openWin('s-win')"><span>⚙️</span>Settings</div>

    <!-- TERMINAL -->
    <div id="t-win" class="win" style="top: 50px; left: 150px; width: 650px; height: 400px;">
        <div class="hdr"><span>🖥️ Terminal</span><button class="close-btn" onclick="closeWin('t-win')">X</button></div>
        <div class="content" style="background:#000;"><div id="term-box" onclick="document.getElementById('term-in').focus()"><div id="term-hist">Web-Mint v24.0. Type 'help'.</div><div style="display:flex"><span>mint@web:~$ &nbsp;</span><input type="text" id="term-in" spellcheck="false" autocomplete="off"></div></div></div>
    </div>

    <!-- BROWSER (Using Bing - Highest Compatibility) -->
    <div id="b-win" class="win" style="top: 80px; left: 300px; width: 900px; height: 600px;">
        <div class="hdr"><span>🌐 Browser (Stable)</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content">
            <div style="background:#eee; padding:8px; display:flex; gap:5px;">
                <input type="text" id="url-input" style="flex-grow:1" value="https://bing.com">
                <button onclick="navBrowser()">Go</button>
            </div>
            <iframe id="browser-frame" src="https://bing.com" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <!-- SETTINGS (Emergency Recovery) -->
    <div id="s-win" class="win" style="top: 150px; left: 400px; width: 450px; height: 350px;">
        <div class="hdr"><span>⚙️ Settings</span><button class="close-btn" onclick="closeWin('s-win')">X</button></div>
        <div class="content">
            <div style="padding:20px; border-bottom:1px solid #eee; color:black;">
                <b>Emergency Recovery</b><br>
                <p style="font-size:12px;">If the OS glitches, click below to restore the factory Mint OS.</p>
                <button onclick="factoryReset()" style="background:#e74c3c; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;">Factory Reset OS</button>
            </div>
        </div>
    </div>

    <!-- EXPLORER -->
    <div id="e-win" class="win" style="top: 100px; left: 100px; width: 450px;">
        <div class="hdr"><span>📁 Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content">
            <div style="padding:10px; background:#f0f0f0;"><button onclick="createNewFile()">+ New File</button></div>
            <div id="explorer-view" style="overflow-y:auto; color:black; height:100%;"></div>
        </div>
    </div>

    <!-- NOTEPAD (File Runner) -->
    <div id="n-win" class="win" style="top: 120px; left: 450px; width: 500px; height: 400px;">
        <div class="hdr"><span id="note-title">📄 Notepad</span><button class="close-btn" onclick="closeWin('n-win')">X</button></div>
        <div class="content">
            <textarea id="editor-area" style="width:100%; height:100%; border:none; padding:15px; outline:none; font-family:monospace;"></textarea>
            <div style="background:#ddd; padding:8px; display:flex; justify-content: space-between;">
                <button onclick="runCurrentFile()" style="background:#2196F3; color:white; border:none; padding:5px 12px; border-radius:4px; cursor:pointer;">🚀 Run File</button>
                <button onclick="saveFile()">💾 Save</button>
            </div>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" style="background:#2ecc71" onclick="openWin('t-win')">Terminal</button>
    <button class="p-btn" onclick="openWin('e-win')">Files</button>
    <button class="p-btn" onclick="openWin('b-win')">Browser</button>
    <div id="clock">00:00:00</div>
</div>

<script>
    let highestZ = 1000;
    // Hard-coded Factory Image
    const FACTORY_CODE = document.documentElement.outerHTML;
    let virtualFS = { 
        "readme.txt": "Welcome to v24.0! Use Settings for Factory Reset if needed.",
        "mint.os": FACTORY_CODE
    };

    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        win.style.zIndex = ++highestZ;
        if(id === 't-win') setTimeout(() => document.getElementById('term-in').focus(), 100);
    }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function navBrowser() {
        let val = document.getElementById('url-input').value;
        if(!val.startsWith('http')) val = "https://" + val;
        document.getElementById('browser-frame').src = val;
    }

    function factoryReset() {
        if(confirm("Restore Factory Settings? This will reload the OS.")) {
            document.open(); document.write(FACTORY_CODE); document.close();
        }
    }

    // TERMINAL
    const tin = document.getElementById('term-in');
    const thist = document.getElementById('term-hist');
    tin.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const input = tin.value.trim();
            const cmd = input.toLowerCase();
            thist.innerHTML += `\nmint@web:~$ ${input}`;
            if(cmd === 'help') thist.innerHTML += `\nCommands: ls, clear, neofetch, help`;
            else if(cmd === 'ls') thist.innerHTML += `\n${Object.keys(virtualFS).join('  ')}`;
            else if(cmd === 'neofetch') thist.innerHTML += `\n<b>Web Mint 24.0</b>\nKernel: Factory-Stable\nShell: MintBash`;
            else if(cmd === 'clear') thist.innerHTML = "Terminal cleared.";
            else if(input !== "") thist.innerHTML += `\n'${cmd}' not recognized.`;
            tin.value = "";
            thist.scrollTop = 9999;
        }
    });

    function loadExplorer() {
        const view = document.getElementById('explorer-view');
        view.innerHTML = "";
        for (let f in virtualFS) {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `📄 ${f}`;
            item.onclick = () => {
                document.getElementById('note-title').innerText = f;
                document.getElementById('editor-area').value = virtualFS[f];
                openWin('n-win');
            };
            view.appendChild(item);
        }
    }

    function createNewFile() {
        const n = prompt("Filename:");
        if(n) { virtualFS[n] = ""; loadExplorer(); }
    }

    function saveFile() {
        const name = document.getElementById('note-title').innerText;
        virtualFS[name] = document.getElementById('editor-area').value;
        alert("Saved.");
    }

    function runCurrentFile() {
        const code = document.getElementById('editor-area').value;
        document.open(); document.write(code); document.close();
    }

    document.querySelectorAll('.win').forEach(win => {
        const h = win.querySelector('.hdr');
        h.onmousedown = (e) => {
            win.style.zIndex = ++highestZ;
            let sx = e.clientX - win.offsetLeft, sy = e.clientY - win.offsetTop;
            document.onmousemove = (ev) => { win.style.left = ev.clientX-sx+'px'; win.style.top = ev.clientY-sy+'px'; };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    loadExplorer();
</script>
</body>
</html>
