<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint OS v21.0 - Community Edition</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #1a1c22 url('file:///home/chronos/u-9d5c7590003e20250841f4563cdf3e21441a4aa8/MyFiles/Downloads/Screenshot%202026-04-28%2011.01.03%20PM.png') center/cover no-repeat fixed; 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }
        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; }
        #panel { position: fixed; bottom: 0; width: 100%; height: 45px; background: #23272e; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid #444; z-index: 10000; }
        .p-btn { background: #4ea84e; color: white; border: none; padding: 6px 12px; cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; }
        #clock { margin-left: auto; font-family: monospace; color: #aaa; }
        
        .win { position: absolute; width: 750px; height: 500px; background: #383c4a; display: none; flex-direction: column; border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #555; overflow: hidden; z-index: 100;}
        .hdr { background: #23272e; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: grab; user-select: none; }
        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 8px; }

        /* Terminal */
        #term-box { background: #000; color: #4af626; height: 100%; display: flex; flex-direction: column; padding: 10px; font-family: monospace; }
        #term-hist { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }
        #term-in { background: transparent; color: #fff; border: none; outline: none; flex-grow: 1; font-family: inherit; font-size: 14px; }

        /* App Store */
        .app-card { border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .install-btn { background: #2196F3; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }

        /* Browser */
        .browser-bar { background: #eee; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #ccc; }
        .browser-bar input { flex-grow: 1; border: 1px solid #bbb; padding: 5px; border-radius: 4px; }
        iframe { width: 100%; flex-grow: 1; border: none; background: white; }

        .icon { position: absolute; width: 90px; text-align: center; cursor: pointer; padding: 10px; color: white; text-shadow: 1px 1px 4px black; }
        .icon span { font-size: 32px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" style="top: 20px; left: 20px;" onclick="openWin('t-win')"><span>🖥️</span>Terminal</div>
    <div class="icon" style="top: 130px; left: 20px;" onclick="openWin('e-win')"><span>📁</span>Files</div>
    <div class="icon" style="top: 240px; left: 20px;" onclick="openWin('b-win')"><span>🌐</span>Browser</div>
    <div class="icon" style="top: 350px; left: 20px;" onclick="openWin('a-win')"><span>🛍️</span>Store</div>

    <!-- TERMINAL -->
    <div id="t-win" class="win" style="top: 50px; left: 150px; width: 650px; height: 400px;">
        <div class="hdr"><span>🖥️ Terminal</span><button class="close-btn" onclick="closeWin('t-win')">X</button></div>
        <div class="content" style="background:#000;"><div id="term-box" onclick="document.getElementById('term-in').focus()"><div id="term-hist">Web-Mint Terminal. Try 'help'.</div><div style="display:flex"><span>mint@web:~$ &nbsp;</span><input type="text" id="term-in" spellcheck="false" autocomplete="off"></div></div></div>
    </div>

    <!-- BROWSER (Fixed Proxy) -->
    <div id="b-win" class="win" style="top: 80px; left: 300px; width: 900px; height: 600px;">
        <div class="hdr"><span>🌐 Browser (Unblocked)</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content">
            <div class="browser-bar">
                <input type="text" id="url-input" placeholder="Search or Enter URL...">
                <button onclick="navBrowser()">Go</button>
            </div>
            <iframe id="browser-frame" src="https://shrtno.de"></iframe>
        </div>
    </div>

    <!-- APP STORE -->
    <div id="a-win" class="win" style="top: 60px; left: 380px; width: 500px; height: 500px;">
        <div class="hdr"><span>🛍️ Mint Store</span><button class="close-btn" onclick="closeWin('a-win')">X</button></div>
        <div class="content" id="store-view" style="overflow-y:auto; color:black;">
            <!-- Apps loaded from localStorage/Script -->
        </div>
    </div>

    <!-- EXPLORER -->
    <div id="e-win" class="win" style="top: 100px; left: 100px; width: 450px;">
        <div class="hdr"><span>📁 Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content">
            <div style="padding:10px; background:#f0f0f0;"><button onclick="createNewFile()">+ New File</button></div>
            <div id="explorer-view" style="overflow-y:auto; color:black; height:100%;"></div>
        </div>
    </div>

    <!-- NOTEPAD (With Store Publishing) -->
    <div id="n-win" class="win" style="top: 120px; left: 450px; width: 500px; height: 400px;">
        <div class="hdr"><span id="note-title">📄 Notepad</span><button class="close-btn" onclick="closeWin('n-win')">X</button></div>
        <div class="content">
            <textarea id="editor-area" style="width:100%; height:100%; border:none; padding:15px; outline:none; font-family:monospace;"></textarea>
            <div style="background:#ddd; padding:8px; display:flex; justify-content: space-between;">
                <div>
                    <button id="inject-btn" style="background:#2196F3; color:white; border:none; padding:5px 10px; display:none;" onclick="injectOS()">🚀 Run</button>
                    <button id="publish-btn" style="background:#ff9800; color:white; border:none; padding:5px 10px; display:none;" onclick="publishApp()">🌍 Publish</button>
                </div>
                <button onclick="saveFile()">💾 Save</button>
            </div>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" style="background:#2ecc71" onclick="openWin('t-win')">Terminal</button>
    <button class="p-btn" onclick="openWin('e-win')">Files</button>
    <button class="p-btn" onclick="openWin('b-win')">Browser</button>
    <button class="p-btn" onclick="openWin('a-win')">Store</button>
    <div id="clock">00:00:00</div>
</div>

<script>
    let highestZ = 1000;
    let virtualFS = { 
        "readme.txt": "Welcome to v21.0! Store is live.",
        "mint.os": document.documentElement.outerHTML 
    };
    
    // Virtual Store Server
    let storeApps = JSON.parse(localStorage.getItem('mintStore') || '[{"name":"DarkTheme.os", "code":"<body style=\'background:#000;color:#fff\'><h1>Dark Mode Active</h1></body>"}]');

    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        win.style.zIndex = ++highestZ;
        if(id === 't-win') setTimeout(() => document.getElementById('term-in').focus(), 100);
        if(id === 'a-win') loadStore();
    }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function navBrowser() {
        let val = document.getElementById('url-input').value;
        if(!val) return;
        if(!val.startsWith('http')) val = "https://" + val;
        document.getElementById('browser-frame').src = "https://shrtno.de" + val;
    }

    // STORE LOGIC
    function loadStore() {
        const view = document.getElementById('store-view');
        view.innerHTML = "<h3>Community Apps</h3>";
        storeApps.forEach((app, index) => {
            const card = document.createElement('div');
            card.className = 'app-card';
            card.innerHTML = `<span>${app.name}</span><button class="install-btn" onclick="installApp(${index})">Install</button>`;
            view.appendChild(card);
        });
    }

    function publishApp() {
        const name = document.getElementById('note-title').innerText;
        const code = document.getElementById('editor-area').value;
        storeApps.push({name, code});
        localStorage.setItem('mintStore', JSON.stringify(storeApps));
        alert("Published to the community store!");
    }

    function installApp(index) {
        const app = storeApps[index];
        virtualFS[app.name] = app.code;
        loadExplorer();
        alert(`Successfully installed ${app.name}! Check your Files.`);
    }

    // TERMINAL
    const tin = document.getElementById('term-in');
    const thist = document.getElementById('term-hist');
    tin.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const input = tin.value.trim();
            const args = input.split(' ');
            const cmd = args.toLowerCase();
            thist.innerHTML += `\nmint@web:~$ ${input}`;
            if(cmd === 'ls') thist.innerHTML += `\n${Object.keys(virtualFS).join('  ')}`;
            else if(cmd === 'help') thist.innerHTML += `\nls, install [app], neofetch, clear`;
            else if(cmd === 'install' && args) { 
                const found = storeApps.find(a => a.name === args);
                if(found) { virtualFS[found.name] = found.code; loadExplorer(); thist.innerHTML += `\nInstalled ${args}.`; }
                else thist.innerHTML += `\nApp not found in store.`;
            }
            else if(cmd === 'clear') thist.innerHTML = "Terminal cleared.";
            else if(input !== "") thist.innerHTML += `\n'${cmd}' not recognized.`;
            tin.value = "";
            thist.scrollTop = 9999;
        }
    });

    function loadExplorer() {
        const view = document.getElementById('explorer-view');
        view.innerHTML = "";
        for (let f in virtualFS) {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = (f.endsWith('.os') || f.endsWith('.html')) ? `💿 ${f}` : `📄 ${f}`;
            item.onclick = () => openFile(f);
            view.appendChild(item);
        }
    }

    function createNewFile() {
        const n = prompt("Filename (.html or .os for apps):");
        if(n) { virtualFS[n] = ""; loadExplorer(); }
    }

    function openFile(n) {
        document.getElementById('note-title').innerText = n;
        document.getElementById('editor-area').value = virtualFS[n];
        const isApp = n.endsWith('.os') || n.endsWith('.html');
        document.getElementById('inject-btn').style.display = isApp ? 'block' : 'none';
        document.getElementById('publish-btn').style.display = isApp ? 'block' : 'none';
        openWin('n-win');
    }

    function saveFile() {
        const name = document.getElementById('note-title').innerText;
        virtualFS[name] = document.getElementById('editor-area').value;
        alert("Saved.");
    }

    function injectOS() {
        const code = document.getElementById('editor-area').value;
        document.open(); document.write(code); document.close();
    }

    document.querySelectorAll('.win').forEach(win => {
        const h = win.querySelector('.hdr');
        h.onmousedown = (e) => {
            win.style.zIndex = ++highestZ;
            let sx = e.clientX - win.offsetLeft, sy = e.clientY - win.offsetTop;
            document.onmousemove = (ev) => { win.style.left = ev.clientX-sx+'px'; win.style.top = ev.clientY-sy+'px'; };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    loadExplorer();
</script>
</body>
</html>
