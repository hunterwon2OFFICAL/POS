<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint OS v5.0</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            /* REPLACE THE URL BELOW WITH YOUR COPIED BROWSER PATH OR AN ONLINE LINK */
            background: #2f343f url('https://unsplash.com') center/cover; 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }

        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; }

        /* Taskbar */
        #panel { 
            position: fixed; bottom: 0; width: 100%; height: 45px; 
            background: rgba(35, 39, 46, 0.95); display: flex; align-items: center; 
            padding: 0 10px; border-top: 1px solid #444; z-index: 9999;
        }

        .p-btn { background: #4ea84e; color: white; border: none; padding: 6px 15px; cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; }

        /* Windows */
        .win { position: absolute; width: 600px; height: 400px; background: #383c4a; display: none; flex-direction: column; border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.7); border: 1px solid #555; }
        .hdr { background: #23272e; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px 6px 0 0; cursor: grab; user-select: none; }
        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 10px; }

        /* Terminal */
        #term-box { background: #000; color: #4af626; height: 100%; display: flex; flex-direction: column; padding: 10px; font-family: monospace; }
        #term-history { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; }
        #term-input { background: transparent; color: #4af626; border: none; outline: none; width: 80%; font-family: inherit; }

        /* Browser Header */
        .browser-bar { background: #eee; padding: 5px; display: flex; gap: 5px; border-bottom: 1px solid #ccc; }
        .browser-bar input { flex-grow: 1; border: 1px solid #bbb; padding: 4px; border-radius: 3px; }

        /* File Explorer & Notepad */
        .file-item { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ddd; }
        .file-item:hover { background: #e8f5e9; }
        #editor-area { width: 100%; height: 100%; padding: 15px; border: none; resize: none; font-size: 16px; outline: none; }
        .save-bar { background: #ddd; padding: 5px; text-align: right; border-top: 1px solid #ccc; }
    </style>
</head>
<body>

<div id="desktop">
    <!-- Terminal -->
    <div id="t-win" class="win" style="top: 20px; left: 20px;">
        <div class="hdr"><span>🖥️ Terminal</span><button class="close-btn" onclick="closeWin('t-win')">X</button></div>
        <div class="content" style="background:#000;">
            <div id="term-box" onclick="document.getElementById('term-input').focus()">
                <div id="term-history">Web-Mint Terminal [v5.0]&#10;Type 'help' for commands.</div>
                <div style="display:flex"><span>mint@web:~$</span><input type="text" id="term-input" spellcheck="false" autocomplete="off"></div>
            </div>
        </div>
    </div>

    <!-- Browser (Using a more stable search embed) -->
    <div id="b-win" class="win" style="top: 50px; left: 300px; width: 850px; height: 550px;">
        <div class="hdr"><span>🌐 Mint Browser</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content">
            <div class="browser-bar">
                <input type="text" id="url-bar" value="https://bing.com">
                <button onclick="goUrl()">Navigate</button>
            </div>
            <iframe id="browser-frame" src="https://bing.com"></iframe>
        </div>
    </div>

    <!-- File Explorer -->
    <div id="e-win" class="win" style="top: 150px; left: 80px;">
        <div class="hdr"><span>📁 File Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content" id="explorer-view"></div>
    </div>

    <!-- Notepad -->
    <div id="n-win" class="win" style="top: 100px; left: 450px; width: 500px; height: 400px;">
        <div class="hdr"><span id="note-title">📄 Notepad</span><button class="close-btn" onclick="closeWin('n-win')">X</button></div>
        <div class="content">
            <textarea id="editor-area"></textarea>
            <div class="save-bar"><button onclick="saveFile()">💾 Save File</button></div>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" style="background:#2ecc71" onclick="openWin('e-win')">LM</button>
    <button class="p-btn" onclick="openWin('t-win')">Terminal</button>
    <button class="p-btn" onclick="openWin('e-win')">Files</button>
    <button class="p-btn" onclick="openWin('b-win')">Browser</button>
</div>

<script>
    let highestZ = 100;
    let currentOpenFile = "";
    let virtualFS = {
        "readme.txt": "Welcome back! Files you save here will persist until you refresh the page.",
        "todo.txt": "1. Test browser\n2. Edit this file\n3. Check terminal",
        "neofetch.sh": "echo 'Mint Web OS v5.0'\necho 'Uptime: 2 minutes'"
    };

    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWin(win);
    }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }
    function focusWin(win) { win.style.zIndex = ++highestZ; }

    // FILE SYSTEM
    function loadExplorer() {
        const view = document.getElementById('explorer-view');
        view.innerHTML = "";
        for (let file in virtualFS) {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `📄 ${file}`;
            item.onclick = () => openFile(file);
            view.appendChild(item);
        }
    }

    function openFile(name) {
        currentOpenFile = name;
        document.getElementById('note-title').innerText = `Editing: ${name}`;
        document.getElementById('editor-area').value = virtualFS[name];
        openWin('n-win');
    }

    function saveFile() {
        if(currentOpenFile) {
            virtualFS[currentOpenFile] = document.getElementById('editor-area').value;
            alert(`File '${currentOpenFile}' saved successfully!`);
        }
    }

    // BROWSER
    function goUrl() {
        let url = document.getElementById('url-bar').value;
        if(!url.includes('://')) url = 'https://' + url;
        document.getElementById('browser-frame').src = url;
    }

    // TERMINAL
    const tin = document.getElementById('term-input');
    const thist = document.getElementById('term-history');
    tin.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const val = tin.value.trim();
            const cmd = val.toLowerCase();
            thist.innerHTML += `\nmint@web:~$ ${val}`;
            
            if(cmd === 'ls') thist.innerHTML += `\n${Object.keys(virtualFS).join('  ')}`;
            else if(cmd === 'clear') thist.innerHTML = "Terminal cleared.";
            else if(cmd === 'neofetch') thist.innerHTML += `\n<b>Web-Mint 5.0</b>\nShell: Bash-JS\nBrowser: Bing-Hybrid`;
            else if(val.startsWith('cat ')) {
                const f = val.split(' ')[1];
                thist.innerHTML += `\n${virtualFS[f] || "File not found."}`;
            }
            else thist.innerHTML += `\n'${cmd}' not found. Type 'help'.`;

            tin.value = "";
            document.getElementById('term-box').scrollTop = 9999;
        }
    });

    // DRAG
    document.querySelectorAll('.win').forEach(win => {
        const header = win.querySelector('.hdr');
        header.onmousedown = function(e) {
            focusWin(win);
            let sx = e.clientX - win.offsetLeft;
            let sy = e.clientY - win.offsetTop;
            document.onmousemove = (e) => {
                win.style.left = (e.clientX - sx) + 'px';
                win.style.top = (e.clientY - sy) + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
        win.onmousedown = () => focusWin(win);
    });

    loadExplorer();
</script>

</body>
</html>
