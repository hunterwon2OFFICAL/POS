<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint - Fixed Browser & Terminal</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #2f343f; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            /* Improved background source */
            background: #1a1c22 url('https://pexels.com') center/cover;
        }

        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; }

        /* Taskbar */
        #panel { 
            position: fixed; bottom: 0; width: 100%; height: 45px; 
            background: rgba(35, 39, 46, 0.9); display: flex; align-items: center; 
            padding: 0 10px; border-top: 1px solid #444; z-index: 9999; backdrop-filter: blur(8px);
        }

        .p-btn { 
            background: #4ea84e; color: white; border: none; padding: 6px 15px; 
            cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; 
        }

        /* Windows */
        .win { 
            position: absolute; width: 650px; height: 450px; 
            background: #383c4a; display: none; flex-direction: column; 
            border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.7); border: 1px solid #555; 
        }

        .hdr { 
            background: #23272e; padding: 10px 15px; display: flex; 
            justify-content: space-between; align-items: center;
            border-radius: 6px 6px 0 0; cursor: grab; user-select: none;
        }

        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 10px; }

        /* Terminal Fix */
        #term-box { 
            background: #000; color: #4af626; height: 100%; 
            display: flex; flex-direction: column; padding: 12px; 
            font-family: 'Consolas', monospace; font-size: 14px;
        }
        #term-history { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; }
        .term-line { display: flex; align-items: center; margin-top: 5px; flex-shrink: 0; }
        #term-input { 
            background: transparent; color: #4af626; border: none; 
            outline: none; flex-grow: 1; font-family: inherit; font-size: inherit;
        }

        /* Browser Header */
        .browser-header { background: #ddd; padding: 5px; display: flex; gap: 5px; border-bottom: 1px solid #aaa; flex-shrink: 0; }
        .browser-header input { flex-grow: 1; border: 1px solid #bbb; padding: 4px; border-radius: 3px; }
        iframe { width: 100%; flex-grow: 1; border: none; background: white; }

        /* Explorer */
        .file-item { padding: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .file-item:hover { background: #e0f2f1; }
    </style>
</head>
<body>

<div id="desktop">
    <!-- Terminal -->
    <div id="t-win" class="win" style="top: 20px; left: 20px;">
        <div class="hdr"><span>🖥️ Terminal</span><button class="close-btn" onclick="closeWin('t-win')">X</button></div>
        <div class="content" style="background:#000;">
            <div id="term-box" onclick="document.getElementById('term-input').focus()">
                <div id="term-history">Web-Mint v2.2 (Cinnamon)&#10;Type 'help' for commands.</div>
                <div class="term-line"><span>mint@web:~$</span><input type="text" id="term-input" spellcheck="false" autocomplete="off"></div>
            </div>
        </div>
    </div>

    <!-- Browser -->
    <div id="b-win" class="win" style="top: 50px; left: 300px; width: 800px; height: 550px;">
        <div class="hdr"><span>🌐 Browser</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content">
            <div class="browser-header">
                <input type="text" id="url-bar" value="https://duckduckgo.com">
                <button onclick="loadUrl()">Go</button>
            </div>
            <!-- Using DuckDuckGo which allows iframes -->
            <iframe id="browser-frame" src="https://duckduckgo.com"></iframe>
        </div>
    </div>

    <!-- Explorer -->
    <div id="e-win" class="win" style="top: 150px; left: 80px;">
        <div class="hdr"><span>📁 Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content">
            <div style="padding:10px; font-weight:bold; border-bottom:1px solid #ccc; background:#eee;">Home > <span id="cur-folder">Documents</span></div>
            <div id="file-list" style="overflow-y:auto; background:white;"></div>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" style="background:#2ecc71">LM</button>
    <button class="p-btn" onclick="openWin('t-win')">Terminal</button>
    <button class="p-btn" onclick="openWin('e-win'); renderFiles('Documents')">Files</button>
    <button class="p-btn" onclick="openWin('b-win')">Browser</button>
</div>

<script>
    let highestZ = 100;
    let fs = { 'Documents': ['readme.txt', 'script.js'], 'Downloads': ['linux-mint.iso'] };

    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWin(win);
        if(id === 't-win') document.getElementById('term-input').focus();
    }

    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    function focusWin(win) {
        highestZ++;
        win.style.zIndex = highestZ;
    }

    // EXPLORER
    function renderFiles(folder) {
        document.getElementById('cur-folder').innerText = folder;
        const list = document.getElementById('file-list');
        list.innerHTML = "";
        
        if(folder === 'Downloads') list.innerHTML += `<div class="file-item" onclick="renderFiles('Documents')">🔙 Back</div>`;
        else list.innerHTML += `<div class="file-item" onclick="renderFiles('Downloads')">📁 Downloads</div>`;

        fs[folder].forEach(f => list.innerHTML += `<div class="file-item">📄 ${f}</div>`);
    }

    // TERMINAL COMMANDS
    const tin = document.getElementById('term-input');
    const thist = document.getElementById('term-history');

    tin.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const val = tin.value.trim();
            const args = val.split(' ');
            const cmd = args[0].toLowerCase();
            thist.innerHTML += `\nmint@web:~$ ${val}`;
            
            if(cmd === 'help') thist.innerHTML += "\n- ls, clear, neofetch, mkdir, rm, browser";
            else if(cmd === 'ls') thist.innerHTML += "\nDocuments/  Downloads/  readme.txt";
            else if(cmd === 'clear') thist.innerHTML = "Terminal cleared.";
            else if(cmd === 'neofetch') thist.innerHTML += "\n<b>OS</b>: Web-Mint 2.2\n<b>Shell</b>: JS-Bash\n<b>Browser</b>: DuckDuckGo-Enforced";
            else if(cmd === 'mkdir') thist.innerHTML += `\nDirectory '${args[1] || 'new_folder'}' created.`;
            else if(cmd === 'rm') thist.innerHTML += `\nRemoved '${args[1] || 'file'}'.`;
            else if(cmd === 'browser') openWin('b-win');
            else if(val !== "") thist.innerHTML += `\n'${cmd}' not found.`;

            tin.value = "";
            document.getElementById('term-box').scrollTop = 9999;
        }
    });

    // BROWSER 
    function loadUrl() {
        let url = document.getElementById('url-bar').value;
        if(!url.includes('://')) url = 'https://' + url;
        document.getElementById('browser-frame').src = url;
    }

    // DRAGGING
    document.querySelectorAll('.win').forEach(win => {
        const header = win.querySelector('.hdr');
        header.onmousedown = function(e) {
            focusWin(win);
            let sx = e.clientX - win.offsetLeft;
            let sy = e.clientY - win.offsetTop;
            document.onmousemove = (e) => {
                win.style.left = e.clientX - sx + 'px';
                win.style.top = e.clientY - sy + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    renderFiles('Documents');
</script>

</body>
</html>
