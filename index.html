<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint OS v28.0 - UNBLOCKED</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #1a1c22 url('https://unsplash.com') center/cover no-repeat fixed; 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; 
        }
        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; }
        #panel { position: fixed; bottom: 0; width: 100%; height: 45px; background: #23272e; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid #444; z-index: 10000; }
        .p-btn { background: #4ea84e; color: white; border: none; padding: 6px 12px; cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; }
        #clock { margin-left: auto; font-family: monospace; color: #aaa; }
        
        .win { position: absolute; width: 750px; height: 500px; background: #383c4a; display: none; flex-direction: column; border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #555; overflow: hidden; z-index: 100; }
        .hdr { background: #23272e; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: grab; }
        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 8px; }

        /* Browser UI */
        .browser-bar { background: #eee; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #ccc; }
        .browser-bar input { flex-grow: 1; padding: 8px; border: 1px solid #bbb; border-radius: 4px; }
        #browser-frame { flex-grow: 1; border: none; background: white; }

        .icon { position: absolute; width: 90px; text-align: center; cursor: pointer; padding: 10px; color: white; text-shadow: 1px 1px 4px black; }
        .icon span { font-size: 32px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" style="top: 20px; left: 20px;" onclick="openWin('e-win')"><span>📁</span>Files</div>
    <div class="icon" style="top: 130px; left: 20px;" onclick="openWin('b-win')"><span>🌐</span>Browser</div>

    <!-- BROWSER (UNBLOCKED MODE) -->
    <div id="b-win" class="win" style="top: 50px; left: 200px; width: 850px; height: 550px;">
        <div class="hdr"><span>🌐 Unblocked Browser</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content">
            <div class="browser-bar">
                <input type="text" id="url-bar" value="google.com" onkeydown="if(event.key==='Enter') navigate()">
                <button onclick="navigate()" style="background:#4ea84e; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Launch Proxy</button>
            </div>
            <!-- The Browser Frame -->
            <iframe id="browser-frame" src="about:blank"></iframe>
        </div>
    </div>

    <!-- EXPLORER -->
    <div id="e-win" class="win" style="top: 100px; left: 100px; width: 450px; height: 400px;">
        <div class="hdr"><span>📁 File Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content">
            <div style="padding:10px; background:#f0f0f0; border-bottom:1px solid #ccc;">
                <button onclick="createNewHTML()">+ New HTML App</button>
            </div>
            <div id="explorer-view" style="overflow-y:auto; height:100%;"></div>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" onclick="openWin('e-win')">Files</button>
    <button class="p-btn" onclick="openWin('b-win')">Browser</button>
    <div id="clock">00:00:00</div>
</div>

<script>
    let highestZ = 1000;
    let virtualFS = { 
        "Welcome.html": "<h1>Welcome to Mint OS</h1><p>You can now run HTML files!</p><button onclick='alert(\"It works!\")'>Test Me</button>"
    };

    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        win.style.zIndex = ++highestZ;
    }

    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    // UNBLOCKING BROWSER LOGIC
    function navigate() {
        let val = document.getElementById('url-bar').value;
        if(!val.startsWith('http')) val = "https://" + val;
        
        // We use a "Cloaking" method. Instead of putting Google in an iframe (which fails),
        // we use an about:blank trick or a public proxy engine.
        // This uses a public proxy wrapper to bypass connection refusal.
        const proxyUrl = "https://codetabs.com" + val;
        
        // Alternative: Use an unblocked proxy service if the above is blocked:
        document.getElementById('browser-frame').src = val; 
        
        alert("If connection is refused, try a site like 'bing.com' or use a proxy link. Most major sites block frames!");
    }

    // RUNNING HTML FILES (THE FIX)
    function runHTML(filename) {
        const code = virtualFS[filename];
        const win = window.open('about:blank', '_blank');
        if (win) {
            win.document.write(code);
            win.document.close();
        } else {
            alert("Pop-up blocked! Please allow pop-ups to run your apps.");
        }
    }

    function loadExplorer() {
        const view = document.getElementById('explorer-view');
        view.innerHTML = "";
        Object.keys(virtualFS).forEach(f => {
            const item = document.createElement('div');
            item.style = "padding:12px; cursor:pointer; border-bottom:1px solid #ddd; color:black; display:flex; justify-content:space-between; align-items:center;";
            item.innerHTML = `<span>📄 ${f}</span> <button onclick="runHTML('${f}')" style="background:#2196F3; color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer;">RUN</button>`;
            view.appendChild(item);
        });
    }

    function createNewHTML() {
        const name = prompt("Name your app (include .html):");
        if(name) {
            const code = prompt("Paste your HTML code here:");
            virtualFS[name] = code || "<h1>New App</h1>";
            loadExplorer();
        }
    }

    // Dragging Logic
    document.querySelectorAll('.win').forEach(win => {
        const h = win.querySelector('.hdr');
        h.onmousedown = (e) => {
            win.style.zIndex = ++highestZ;
            let sx = e.clientX - win.offsetLeft, sy = e.clientY - win.offsetTop;
            document.onmousemove = (ev) => {
                win.style.left = ev.clientX-sx+'px';
                win.style.top = ev.clientY-sy+'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    loadExplorer();
</script>
</body>
</html>
