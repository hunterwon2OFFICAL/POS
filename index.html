<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint OS v27.0 - Proxy & Store Edition</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #1a1c22 url('file:///home/chronos/u-9d5c7590003e20250841f4563cdf3e21441a4aa8/MyFiles/Downloads/Screenshot%202026-04-28%2011.01.03%20PM.png') center/cover no-repeat fixed; 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }
        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; }
        #panel { position: fixed; bottom: 0; width: 100%; height: 45px; background: #23272e; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid #444; z-index: 10000; }
        .p-btn { background: #4ea84e; color: white; border: none; padding: 6px 12px; cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; }
        #clock { margin-left: auto; font-family: monospace; color: #aaa; }
        .win { position: absolute; width: 750px; height: 500px; background: #383c4a; display: none; flex-direction: column; border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #555; overflow: hidden; z-index: 100; }
        .hdr { background: #23272e; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: grab; user-select: none; }
        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 8px; }

        /* Terminal */
        #term-box { background: #000; color: #4af626; height: 100%; display: flex; flex-direction: column; padding: 12px; font-family: 'Consolas', monospace; }
        #term-hist { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }
        #term-in { background: transparent; color: #fff; border: none; outline: none; flex-grow: 1; font-family: inherit; font-size: 14px; }

        /* Browser Header */
        .browser-bar { background: #eee; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #ccc; }
        .browser-bar input { flex-grow: 1; padding: 5px; border-radius: 4px; border: 1px solid #bbb; }

        /* App Store Style */
        .store-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .install-btn { background: #2196F3; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .icon { position: absolute; width: 90px; text-align: center; cursor: pointer; padding: 10px; color: white; text-shadow: 1px 1px 4px black; }
        .icon span { font-size: 32px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="desktop">
    <!-- DESKTOP ICONS -->
    <div class="icon" style="top: 20px; left: 20px;" onclick="openWin('t-win')"><span>🖥️</span>Terminal</div>
    <div class="icon" style="top: 130px; left: 20px;" onclick="openWin('e-win')"><span>📁</span>Files</div>
    <div class="icon" style="top: 240px; left: 20px;" onclick="openWin('b-win')"><span>🌐</span>Browser</div>
    <div class="icon" style="top: 350px; left: 20px;" onclick="openWin('a-win')"><span>🛍️</span>Store</div>

    <!-- TERMINAL -->
    <div id="t-win" class="win" style="top: 50px; left: 150px; width: 650px; height: 400px;">
        <div class="hdr"><span>🖥️ Terminal</span><button class="close-btn" onclick="closeWin('t-win')">X</button></div>
        <div class="content" style="background:#000;">
            <div id="term-box" onclick="document.getElementById('term-in').focus()">
                <div id="term-hist">Web-Mint v27.0. Type 'help' for commands.</div>
                <div style="display:flex"><span style="color:#4af626">mint@web:~$ &nbsp;</span><input type="text" id="term-in" spellcheck="false" autocomplete="off"></div>
            </div>
        </div>
    </div>

    <!-- BROWSER (PROXIED - No more "Refused to Connect") -->
    <div id="b-win" class="win" style="top: 80px; left: 300px; width: 900px; height: 600px;">
        <div class="hdr"><span>🌐 Mint Browser (Stealth Proxy)</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content">
            <div class="browser-bar">
                <input type="text" id="url-bar" value="wikipedia.org">
                <button onclick="navProxy()">Go</button>
            </div>
            <!-- This proxy strips blocking headers -->
            <iframe id="browser-frame" src="https://hypothes.is" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <!-- APP STORE (REAL STORE) -->
    <div id="a-win" class="win" style="top: 100px; left: 400px; width: 550px; height: 500px;">
        <div class="hdr"><span>🛍️ Mint App Store</span><button class="close-btn" onclick="closeWin('a-win')">X</button></div>
        <div class="content" style="overflow-y:auto; color:black; padding:10px;">
            <h2 style="text-align:center; border-bottom: 2px solid #4ea84e; padding-bottom: 10px;">Official App Store</h2>
            
            <div class="store-item">
                <div><b>Cinnamon Update 1.2</b><br><small>Updates your theme and icons.</small></div>
                <button class="install-btn" onclick="runStoreCode('<h1>System Updated!</h1><p>Restart recommended.</p>')">Install & Run</button>
            </div>

            <div class="store-item">
                <div><b>Snake Game</b><br><small>Classic arcade game for Mint.</small></div>
                <button class="install-btn" onclick="runStoreCode('<h1>Snake Game</h1><p>Control with arrows...</p>')">Install & Run</button>
            </div>
        </div>
    </div>

    <!-- EXPLORER -->
    <div id="e-win" class="win" style="top: 150px; left: 100px; width: 450px;">
        <div class="hdr"><span>📁 Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content">
            <div style="padding:10px; background:#f0f0f0;"><button onclick="createNewFile()">+ New File</button></div>
            <div id="explorer-view" style="overflow-y:auto; color:black; height:100%;"></div>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" style="background:#2ecc71" onclick="openWin('t-win')">Terminal</button>
    <button class="p-btn" onclick="openWin('e-win')">Files</button>
    <button class="p-btn" onclick="openWin('b-win')">Browser</button>
    <button class="p-btn" onclick="openWin('a-win')">Store</button>
    <div id="clock">00:00:00</div>
</div>

<script>
    let highestZ = 1000;
    let virtualFS = { "readme.txt": "Type 'help' in terminal. Use 'Install & Run' in store to change OS." };

    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        win.style.zIndex = ++highestZ;
        if(id === 't-win') setTimeout(() => document.getElementById('term-in').focus(), 100);
    }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    // BROWSER PROXY LOGIC (Fixed blocks)
    function navProxy() {
        let val = document.getElementById('url-bar').value;
        if(!val.startsWith('http')) val = "https://" + val;
        // via.hypothes.is is a robust proxy that allows almost all sites inside frames
        document.getElementById('browser-frame').src = "https://hypothes.is" + val;
    }

    // RUN STORE APPS (Changes OS state)
    function runStoreCode(code) {
        if(confirm("This will execute app code and modify your session. Proceed?")) {
            document.open();
            document.write(code);
            document.close();
        }
    }

    // TERMINAL COMMANDS (Restored)
    const tin = document.getElementById('term-in');
    const thist = document.getElementById('term-hist');
    tin.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const input = tin.value.trim();
            const cmd = input.toLowerCase();
            thist.innerHTML += `\nmint@web:~$ ${input}`;

            if(cmd === 'help') {
                thist.innerHTML += `\nCommands:\n- help: Commands list\n- ls: List files\n- neofetch: System Info\n- clear: Reset Screen`;
            } else if(cmd === 'ls') {
                thist.innerHTML += `\n${Object.keys(virtualFS).join('   ')}`;
            } else if(cmd === 'neofetch') {
                thist.innerHTML += `\n<b>Web Mint 27.0</b>\nKernel: Proxy-Frame-Core\nBrowser: Anti-Block Enabled`;
            } else if(cmd === 'clear') {
                thist.innerHTML = "Terminal cleared.";
            } else if(input !== "") {
                thist.innerHTML += `\n'${cmd}' is not a valid command. Type 'help'.`;
            }

            tin.value = "";
            thist.scrollTop = 9999;
        }
    });

    function loadExplorer() {
        const view = document.getElementById('explorer-view');
        view.innerHTML = "";
        for (let f in virtualFS) {
            const item = document.createElement('div');
            item.style = "padding:12px; cursor:pointer; border-bottom:1px solid #ddd;";
            item.innerHTML = `📄 ${f}`;
            view.appendChild(item);
        }
    }
    function createNewFile() { const n = prompt("Name:"); if(n) { virtualFS[n] = ""; loadExplorer(); } }

    document.querySelectorAll('.win').forEach(win => {
        const h = win.querySelector('.hdr');
        h.onmousedown = (e) => {
            win.style.zIndex = ++highestZ;
            let sx = e.clientX - win.offsetLeft, sy = e.clientY - win.offsetTop;
            document.onmousemove = (ev) => { win.style.left = ev.clientX-sx+'px'; win.style.top = ev.clientY-sy+'px'; };
            document.onmouseup = () => document.onmousemove = null;
        };
    });

    loadExplorer();
</script>
</body>
</html>
