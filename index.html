<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linux Mint Cinnamon Web OS</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Ubuntu', 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #2f343f; /* Mint Dark Grey */
            color: white;
        }

        /* Desktop Area */
        #desktop {
            position: absolute;
            top: 0; left: 0; width: 100%; height: calc(100% - 40px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .icon {
            width: 100px;
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            background: transparent;
            border: 1px solid transparent;
        }
        .icon:hover {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .icon-symbol { font-size: 50px; display: block; margin-bottom: 5px; pointer-events: none; }
        .icon-text { font-size: 14px; font-weight: 500; pointer-events: none; }

        /* Window System */
        .window {
            position: absolute;
            width: 600px;
            height: 400px;
            background: #383c4a;
            border: 1px solid #555;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; /* Hidden by default */
            flex-direction: column;
            border-radius: 6px 6px 0 0;
            z-index: 100;
        }
        .window-header {
            background: #23272e;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            border-radius: 6px 6px 0 0;
            user-select: none;
        }
        .window-title { font-weight: bold; font-size: 14px; }
        .close-btn {
            background: #e74c3c;
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            text-align: center;
        }

        /* App Content Areas */
        .window-content { flex-grow: 1; display: flex; overflow: hidden; }

        /* Terminal Styling */
        #terminal-body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            width: 100%;
            overflow-y: auto;
        }
        #terminal-input {
            background: transparent;
            border: none;
            color: #00ff00;
            outline: none;
            width: 80%;
            font-family: inherit;
            font-size: 14px;
        }

        /* Explorer Styling */
        #explorer-body {
            background: #fdfdfd;
            color: #333;
            width: 100%;
            display: flex;
        }
        .explorer-sidebar {
            width: 150px;
            background: #f0f0f0;
            border-right: 1px solid #ccc;
            padding: 10px;
            font-size: 14px;
        }
        .sidebar-item { padding: 8px; cursor: pointer; border-radius: 3px; }
        .sidebar-item:hover { background: #e0e0e0; }
        .explorer-main {
            flex-grow: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 20px;
        }
        .file-item { text-align: center; cursor: pointer; }
        .file-icon { font-size: 30px; display: block; }
        .file-name { font-size: 12px; margin-top: 5px; }

        /* Panel / Taskbar */
        #panel {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 40px;
            background: #23272e;
            border-top: 1px solid #444;
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
        }
        #start-menu {
            background: #4ea84e; /* Cinnamon Green */
            border: none;
            padding: 5px 15px;
            color: white;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 15px;
        }
        #clock { margin-left: auto; font-size: 13px; color: #ccc; }
    </style>
</head>
<body>

    <div id="desktop">
        <div class="icon" id="terminal-icon">
            <span class="icon-symbol">🖥️</span>
            <span class="icon-text">Terminal</span>
        </div>
        <div class="icon" id="explorer-icon">
            <span class="icon-symbol">📂</span>
            <span class="icon-text">Home</span>
        </div>
    </div>

    <!-- Terminal Window -->
    <div id="terminal-window" class="window" style="top: 80px; left: 50px;">
        <div class="window-header">
            <span class="window-title">Terminal - mint@web</span>
            <button class="close-btn" data-close="terminal-window">×</button>
        </div>
        <div class="window-content">
            <div id="terminal-body">
                <div>Welcome to Web Mint OS. Type 'help'.</div>
                <div id="terminal-log"></div>
                <span>mint@web:~$ </span><input type="text" id="terminal-input" spellcheck="false" autofocus>
            </div>
        </div>
    </div>

    <!-- Explorer Window -->
    <div id="explorer-window" class="window" style="top: 120px; left: 100px;">
        <div class="window-header">
            <span class="window-title">Home - File Browser</span>
            <button class="close-btn" data-close="explorer-window">×</button>
        </div>
        <div class="window-content">
            <div id="explorer-body">
                <div class="explorer-sidebar">
                    <div class="sidebar-item">🏠 Home</div>
                    <div class="sidebar-item">📄 Documents</div>
                    <div class="sidebar-item">📥 Downloads</div>
                </div>
                <div class="explorer-main" id="file-grid"></div>
            </div>
        </div>
    </div>

    <div id="panel">
        <button id="start-menu">LM</button>
        <div id="clock"></div>
    </div>

    <script>
        // --- WINDOW MANAGEMENT ---
        function openWindow(id) {
            const win = document.getElementById(id);
            win.style.display = 'flex';
            win.style.zIndex = 200;
            document.querySelectorAll('.window').forEach(w => { if(w !== win) w.style.zIndex = 100; });
            if(id === 'terminal-window') document.getElementById('terminal-input').focus();
        }

        document.getElementById('terminal-icon').addEventListener('click', () => openWindow('terminal-window'));
        document.getElementById('explorer-icon').addEventListener('click', () => openWindow('explorer-window'));

        document.querySelectorAll('.close-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.target.getAttribute('data-close');
                document.getElementById(id).style.display = 'none';
            });
        });

        // --- DRAGGING LOGIC ---
        let isDragging = false; let activeWin = null; let offset = { x: 0, y: 0 };
        document.querySelectorAll('.window-header').forEach(header => {
            header.addEventListener('mousedown', (e) => {
                if(e.target.className === 'close-btn') return;
                isDragging = true; activeWin = header.parentElement;
                offset.x = e.clientX - activeWin.offsetLeft;
                offset.y = e.clientY - activeWin.offsetTop;
                document.querySelectorAll('.window').forEach(w => w.style.zIndex = 100);
                activeWin.style.zIndex = 200;
            });
        });
        window.addEventListener('mousemove', (e) => {
            if (isDragging && activeWin) {
                activeWin.style.left = (e.clientX - offset.x) + 'px';
                activeWin.style.top = (e.clientY - offset.y) + 'px';
            }
        });
        window.addEventListener('mouseup', () => { isDragging = false; activeWin = null; });

        // --- TERMINAL LOGIC ---
        const termInput = document.getElementById('terminal-input');
        const termLog = document.getElementById('terminal-log');
        termInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = termInput.value.trim().toLowerCase();
                termLog.innerHTML += `<div>mint@web:~$ ${termInput.value}</div>`;
                if(val === 'help') termLog.innerHTML += '<div>help, date, whoami, clear</div>';
                else if(val === 'date') termLog.innerHTML += `<div>${new Date().toLocaleString()}</div>`;
                else if(val === 'whoami') termLog.innerHTML += '<div>mint-user</div>';
                else if(val === 'clear') termLog.innerHTML = '';
                else if(val !== '') termLog.innerHTML += `<div>bash: ${val}: command not found</div>`;
                termInput.value = '';
                document.getElementById('terminal-body').scrollTop = 99999;
            }
        });

        // --- EXPLORER LOGIC ---
        const files = [{ name: 'Documents', type: 'folder' }, { name: 'Music', type: 'folder' }, { name: 'mint.txt', type: 'file' }];
        function renderFiles() {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = '';
            files.forEach(f => {
                grid.innerHTML += `<div class="file-item"><span class="file-icon">${f.type === 'folder' ? '📁' : '📄'}</span><span class="file-name">${f.name}</span></div>`;
            });
        }
        renderFiles();

        // --- CLOCK ---
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);
    </script>
</body>
</html>
