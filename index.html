<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint - Cinnamon Edition</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #2f343f; color: #fff; }
        #desktop { height: calc(100vh - 40px); position: relative; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .desktop-icon { width: 80px; text-align: center; cursor: pointer; padding: 10px; border-radius: 4px; z-index: 5; }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.1); }
        .icon-symbol { font-size: 40px; display: block; }
        
        #panel { height: 40px; background: #23272e; border-top: 1px solid #444; display: flex; align-items: center; padding: 0 10px; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        #menu-btn { background: #4ea84e; border: none; padding: 4px 10px; color: white; border-radius: 3px; cursor: pointer; margin-right: 15px; }

        .window { position: absolute; width: 500px; height: 350px; background: #383c4a; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: none; flex-direction: column; border-radius: 6px 6px 0 0; z-index: 10; }
        .window-header { background: #2f343f; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; cursor: move; }
        .close-btn { background: #e74c3c; border: none; color: white; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; }

        .term-body { flex-grow: 1; background: #000; color: #0f0; padding: 10px; font-family: monospace; overflow-y: auto; }
        .expl-body { flex-grow: 1; background: #fff; color: #333; display: flex; }
        .sidebar { width: 120px; background: #e0e0e0; padding: 10px; border-right: 1px solid #ccc; font-size: 14px; }
        .file-view { flex-grow: 1; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        input { background: transparent; border: none; color: #0f0; outline: none; width: 80%; font-family: inherit; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="desktop-icon" onclick="openApp('explorer-win')">
        <span class="icon-symbol">📁</span><span style="font-size:12px">Home</span>
    </div>
    <div class="desktop-icon" onclick="openApp('terminal-win')">
        <span class="icon-symbol">🖥️</span><span style="font-size:12px">Terminal</span>
    </div>
</div>

<div id="panel">
    <button id="menu-btn">LM</button>
    <div id="taskbar-icons" style="display:flex; gap:5px"></div>
    <div id="clock" style="margin-left: auto; font-size: 12px;"></div>
</div>

<!-- Terminal -->
<div id="terminal-win" class="window">
    <div class="window-header" onmousedown="dragStart(event, 'terminal-win')">
        <span>Terminal</span><button class="close-btn" onclick="closeApp('terminal-win')">x</button>
    </div>
    <div class="term-body" id="term-out">
        <div>Type 'help' to start.</div>
        <div id="log"></div>
        <span>mint@web:~$ </span><input type="text" id="term-input" autofocus>
    </div>
</div>

<!-- Explorer -->
<div id="explorer-win" class="window">
    <div class="window-header" onmousedown="dragStart(event, 'explorer-win')">
        <span>File Explorer</span><button class="close-btn" onclick="closeApp('explorer-win')">x</button>
    </div>
    <div class="expl-body">
        <div class="sidebar">
            <div onclick="renderDir('Home')">🏠 Home</div>
            <div onclick="renderDir('Docs')">📄 Documents</div>
        </div>
        <div class="file-view" id="file-view"></div>
    </div>
</div>

<script>
    let dragWin = null; let offsetX, offsetY;

    // Window Controls
    function openApp(id) {
        const w = document.getElementById(id);
        w.style.display = 'flex';
        w.style.zIndex = 100;
        if(id === 'explorer-win') renderDir('Home');
    }

    function closeApp(id) { document.getElementById(id).style.display = 'none'; }

    function dragStart(e, id) {
        dragWin = document.getElementById(id);
        offsetX = e.clientX - dragWin.offsetLeft;
        offsetY = e.clientY - dragWin.offsetTop;
        document.querySelectorAll('.window').forEach(win => win.style.zIndex = 1);
        dragWin.style.zIndex = 100;
    }

    window.onmousemove = (e) => {
        if(dragWin) { dragWin.style.left = (e.clientX - offsetX) + 'px'; dragWin.style.top = (e.clientY - offsetY) + 'px'; }
    }
    window.onmouseup = () => dragWin = null;

    // Terminal Commands
    const input = document.getElementById('term-input');
    input.onkeydown = (e) => {
        if(e.key === 'Enter') {
            const cmd = input.value.toLowerCase();
            const log = document.getElementById('log');
            log.innerHTML += `<div>mint@web:~$ ${input.value}</div>`;
            if(cmd === 'help') log.innerHTML += "<div>Commands: clear, date, whoami</div>";
            else if(cmd === 'clear') log.innerHTML = "";
            else if(cmd === 'whoami') log.innerHTML += "<div>mint-user</div>";
            input.value = "";
        }
    }

    // Explorer Navigation
    const fs = { 'Home': ['Documents', 'Downloads', 'todo.txt'], 'Docs': ['resume.pdf', 'code.js'] };
    function renderDir(dir) {
        const view = document.getElementById('file-view');
        view.innerHTML = "";
        (fs[dir] || []).forEach(f => {
            const isFile = f.includes('.');
            view.innerHTML += `<div style="text-align:center; cursor:pointer;" onclick="${!isFile ? `renderDir('Docs')` : ''}">
                <div style="font-size:30px">${isFile ? '📄' : '📁'}</div><span style="font-size:11px">${f}</span></div>`;
        });
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>

</html>
