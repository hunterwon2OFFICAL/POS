<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mint - Cinnamon Edition</title>
    <style>
        body { 
            background: #2f343f; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            background-image: radial-gradient(#444 1px, transparent 1px); background-size: 20px 20px;
        }

        #desktop { width: 100%; height: calc(100vh - 45px); position: relative; }

        /* Taskbar */
        #panel { 
            position: fixed; bottom: 0; width: 100%; height: 45px; 
            background: #23272e; display: flex; align-items: center; 
            padding: 0 10px; border-top: 1px solid #444; z-index: 9999; 
        }

        .p-btn { 
            background: #4ea84e; color: white; border: none; padding: 6px 12px; 
            cursor: pointer; margin-right: 8px; border-radius: 4px; font-weight: bold; 
        }

        /* Window Styling */
        .win { 
            position: absolute; width: 600px; height: 400px; 
            background: #383c4a; display: none; flex-direction: column; 
            border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); border: 1px solid #555; 
        }

        .hdr { 
            background: #23272e; padding: 10px 15px; display: flex; 
            justify-content: space-between; align-items: center;
            border-radius: 6px 6px 0 0; cursor: grab; user-select: none; 
        }

        .content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #000;}
        .close-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 10px; }

        /* Terminal Fixed */
        #term-container { background: #000; color: #4af626; height: 100%; font-family: monospace; padding: 10px; overflow-y: auto; }
        #term-input { background: transparent; color: #4af626; border: none; outline: none; width: 80%; font-family: monospace; font-size: 14px; }

        /* Browser Styling */
        .browser-bar { background: #eee; padding: 5px; display: flex; gap: 5px; border-bottom: 1px solid #ccc; }
        .browser-bar input { flex-grow: 1; padding: 4px; border: 1px solid #ccc; border-radius: 3px; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* Explorer */
        .file-item { padding: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .file-item:hover { background: #e8f5e9; }
    </style>
</head>
<body>

<div id="desktop">
    <!-- Terminal Window -->
    <div id="t-win" class="win" style="top: 30px; left: 30px;">
        <div class="hdr"><span>🖥️ Terminal</span><button class="close-btn" onclick="closeWin('t-win')">X</button></div>
        <div class="content" style="background: #000;">
            <div id="term-container" onclick="document.getElementById('term-input').focus()">
                <div id="term-history">Welcome to Web-Mint Terminal<br>Type 'help' for commands.</div>
                <span>mint@web:~$ </span><input type="text" id="term-input" autofocus spellcheck="false">
            </div>
        </div>
    </div>

    <!-- Browser Window -->
    <div id="b-win" class="win" style="top: 80px; left: 300px; width: 800px; height: 500px;">
        <div class="hdr"><span>🌐 Web Browser</span><button class="close-btn" onclick="closeWin('b-win')">X</button></div>
        <div class="content">
            <div class="browser-bar">
                <input type="text" id="browser-url" value="https://bing.com">
                <button onclick="goUrl()">Go</button>
            </div>
            <iframe id="browser-frame" src="https://bing.com"></iframe>
        </div>
    </div>

    <!-- Explorer Window -->
    <div id="e-win" class="win" style="top: 150px; left: 100px;">
        <div class="hdr"><span>📁 Explorer</span><button class="close-btn" onclick="closeWin('e-win')">X</button></div>
        <div class="content">
            <div class="file-item" onclick="alert('Opening Documents...')">📁 Documents</div>
            <div class="file-item" onclick="alert('Downloads empty')">📁 Downloads</div>
            <div class="file-item" onclick="openWin('b-win')">🌐 Web Browser.desktop</div>
        </div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" style="background:#2ecc71" onclick="alert('Menu coming soon!')">LM</button>
    <button class="p-btn" onclick="openWin('t-win')">Terminal</button>
    <button class="p-btn" onclick="openWin('e-win')">Files</button>
    <button class="p-btn" onclick="openWin('b-win')">Browser</button>
</div>

<script>
    let highestZ = 100;

    function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWin(win);
    }

    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    function focusWin(win) {
        highestZ++;
        win.style.zIndex = highestZ;
    }

    // Terminal Logic
    const termInput = document.getElementById('term-input');
    const termHistory = document.getElementById('term-history');

    termInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const cmd = this.value.trim().toLowerCase();
            termHistory.innerHTML += `<div>mint@web:~$ ${this.value}</div>`;
            
            if (cmd === 'help') {
                termHistory.innerHTML += "<div>Available: help, clear, exit, browser, ls</div>";
            } else if (cmd === 'clear') {
                termHistory.innerHTML = "";
            } else if (cmd === 'ls') {
                termHistory.innerHTML += "<div>Documents  Downloads  readme.txt</div>";
            } else if (cmd === 'browser') {
                openWin('b-win');
                termHistory.innerHTML += "<div>Opening Browser...</div>";
            } else {
                termHistory.innerHTML += `<div>Command '${cmd}' not found.</div>`;
            }
            
            this.value = "";
            document.getElementById('term-container').scrollTop = 9999;
        }
    });

    // Browser Logic
    function goUrl() {
        const url = document.getElementById('browser-url').value;
        document.getElementById('browser-frame').src = url;
    }

    // Dragging Logic
    document.querySelectorAll('.win').forEach(win => {
        const header = win.querySelector('.hdr');
        header.onmousedown = function(e) {
            focusWin(win);
            let shiftX = e.clientX - win.getBoundingClientRect().left;
            let shiftY = e.clientY - win.getBoundingClientRect().top;

            function moveAt(pageX, pageY) {
                win.style.left = pageX - shiftX + 'px';
                win.style.top = pageY - shiftY + 'px';
            }

            function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            document.onmouseup = function() {
                document.removeEventListener('mousemove', onMouseMove);
                document.onmouseup = null;
            };
        };
        win.onmousedown = () => focusWin(win);
    });
</script>

</body>
</html>
